<div class="p-6">
  <h1 class="text-2xl font-semibold mb-6">Danh sách</h1>

  <div class="overflow-x-auto">
    <table class="w-full border border-gray-300 rounded-lg">
      <thead class="bg-gray-100">
        <tr>
          <th class="px-4 py-2 border border-gray-300 text-center">ID</th>
          <th class="px-4 py-2 border border-gray-300 text-center">Title</th>
          <th class="px-4 py-2 border border-gray-300 text-center">Actions</th>
        </tr>
      </thead>

      <tbody>
        @for (story of stories; track story.id) {
          <tr class="hover:bg-gray-50">
            <td class="px-4 py-2 border border-gray-300">{{ story.id }}</td>
            <td class="px-4 py-2 border border-gray-300">{{ story.title }}</td>
            <td class="px-4 py-2 border border-gray-300">
              <div class="flex gap-2 justify-center">
                <button
                  (click)="deleteStory(story.id)"
                  class="px-5 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition"
                >
                  Delete
                </button>
                <button
                  class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
                >
                  <a href="/edit/{{ story.id }}">Edit</a>
                </button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
